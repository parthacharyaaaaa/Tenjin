[database]
POSTGRES_HOST="127.0.0.1"
POSTGRES_PORT=5432
POSTGRES_DATABASE="resource_db"


[database.SQLALCHEMY]
SQLALCHEMY_POOL_SIZE=16
SQLALCHEMY_MAX_OVERFLOW=8
SQLALCHEMY_POOL_RECYCLE=600
SQLALCHEMY_POOL_TIMEOUT=15
SQLALCHEMY_TRACK_MODIFICATIONS=false


[redis.app]
HOST="127.0.0.1"
PORT=6379
DB=0


[redis.internal]
HOST="127.0.0.1"
PORT=6390
DB=0

[cache]
# All units in seconds, unless specified otherwise
TTL_CAP=86400
TTL_PROMOTION=15
TTL_STRONGEST=1200
TTL_STRONG=600
TTL_WEAK=300
TTL_EPHEMERAL=60

NF_SENTINEL_KEY="__NF__"
NF_SENTINEL_VALUE="1"

[worker]
MAX_RETRIES=2

DLQ_NAME="DLQ"
COUNTER_REGISTRY_NAME="counters"
COUNTER_RETRY_REGISTRY_NAME="counters:retries"
COUNTER_REGISTRY_REFRESH_INTERVAL=1800          # seconds
COUNTER_FLUSH_LOCK_TTL=120                      # seconds
COUNTER_FLUSH_INTERVAL=10                       # seconds
